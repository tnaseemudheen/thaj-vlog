<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Shorts — Thaj Vlog</title>
  <link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>
  <nav class="theme-bar" aria-hidden="false">
    <button class="theme-btn" data-theme="apple"></button>
    <button class="theme-btn" data-theme="snapchat">👻</button>
    <button class="theme-btn" data-theme="chatgpt">💬</button>
    <button class="theme-btn" data-theme="dark">🎬</button>
    <a class="theme-link" href="index.html">🏠</a>
    <a class="theme-link" href="videos.html">🎥</a>
  </nav>

  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand"><img src="assets/img/logo.png" alt="logo" class="brand-logo"/><div><h1 class="brand-title">Thaj Vlog</h1></div></div>
      <div class="top-actions">
        <input id="searchShort" placeholder="Search shorts..." />
        <a class="btn subscribe" href="https://www.youtube.com/@itsThajvlog" target="_blank">🔔</a>
      </div>
    </div>
  </header>

  <main class="container">
    <a class="back" href="index.html">← Back</a>
    <h2>Shorts</h2>
    <div id="shortsGrid" class="shorts-grid">
      <div class="loading">Loading shorts…</div>
    </div>
  </main>

  <footer class="site-footer"><div class="container">© Thaj Vlog</div></footer>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    (async function(){
      try {
        await App.init();
        const shorts = await App.fetchShorts({ maxResults: 50 });
        const grid = document.getElementById('shortsGrid');
        App.renderShortCards(shorts, grid);
      } catch (e) {
        console.error(e);
        document.getElementById('shortsGrid').innerHTML = '<div class="error">Error loading shorts</div>';
      }
    })();
  </script>
</body>
</html>
